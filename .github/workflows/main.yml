      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/mgz0227/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/
          
          

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@master
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --no-frozen-lockfile

    #  - name: Type Check Frontend
    #    shell: bash
    #    run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Cargo profile
        shell: bash
        run: |
          echo "===== build/src-tauri/Cargo.toml ====="
          cat build/src-tauri/Cargo.toml

      - name: Build Tauri App
        shell: bash
        env:
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
          CARGO_PROFILE_RELEASE_OPT_LEVEL: 0
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
        run: |
          cd build
          pnpm tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-windows-latest
          path: |
            build/src-tauri/target/release/bundle/nsis/*.exe
            build/src-tauri/target/release/bundle/msi/*.msi

  build-macos:
