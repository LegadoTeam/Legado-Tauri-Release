      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --no-frozen-lockfile

     # - name: Type Check Frontend
     #   shell: bash
      #  run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        shell: bash
