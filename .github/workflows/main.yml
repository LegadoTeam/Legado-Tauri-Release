            build/dist/**

  release:
    name: Release
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - build-Harmony
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN_MGZ }}

      - name: Download Artifacts
        uses: actions/download-artifact@main

      - name: Generate release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="Beta-3.26.$(TZ='Asia/Shanghai' date +'%m%d%H%M')"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create Git tag when no tag input
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "${{ steps.meta.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.meta.outputs.tag_name }}"
          else
            git tag "${{ steps.meta.outputs.tag_name }}"
            git push origin "${{ steps.meta.outputs.tag_name }}"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          files: |
            **/Legado-Linux-with-dist.zip
            **/Legado-Harmony-with-dist.zip
            **/*.apk
            **/*.AppImage
            **/*.deb
            **/*.rpm
            **/*.dmg
            **/*.exe
            **/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}

      - name: Delete workflow runs
        uses: mgz0227/delete-workflow-runs@main
        continue-on-error: true
        with:
          token: ${{ secrets.TOKEN_MGZ }}
          retain_days: 100
          keep_minimum_runs: 0

      - name: Remove old Releases
        uses: mgz0227/delete-older-releases@master
        continue-on-error: true
        if: env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 15
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}
