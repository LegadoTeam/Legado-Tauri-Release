name: Build Legado Tauri (Full Auto)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'   # 打 tag 自动发版，例如 v1.0.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Git Auth
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"


      - name: Clone Frontend
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri-Frontend.git frontend

      - name: Clone Backend
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri-Backend.git backend

      - name: Merge Project
        shell: bash
        run: |
          mkdir build
          cp -r frontend/* build/

          # 如果 backend 是 tauri 核心
          if [ -d "backend/src-tauri" ]; then
            cp -r backend/src-tauri build/
          else
            cp -r backend/* build/
          fi

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@main
        with:
          version: 9

      - name: Cache pnpm
        uses: actions/cache@main
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}

      - name: Install Dependencies
        run: |
          cd build
          pnpm install --frozen-lockfile

      - name: Build Frontend
        run: |
          cd build
          pnpm build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        run: |
          cd build
          pnpm tauri build


      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-${{ matrix.os }}
          path: |
            build/src-tauri/target/release/
            build/src-tauri/target/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@master

      - name: Create Release
        uses: softprops/action-gh-release@master
        with:
          files: |
            **/*
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}
