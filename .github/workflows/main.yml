name: Build Legado Tauri (Full Auto)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/mgz0227/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/
          
          

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@master
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --no-frozen-lockfile

     # - name: Type Check Frontend
     #   shell: bash
      #  run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

          pkg-config --modversion glib-2.0
          pkg-config --cflags glib-2.0
          pkg-config --libs glib-2.0

      - name: Build Tauri App
        shell: bash
        env:
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cd build
          pnpm tauri build

      - name: Pack binary with dist
        shell: bash
        run: |
          mkdir -p package/legado_tauri
          cp build/src-tauri/target/release/legado_tauri package/legado_tauri/
          cp -r build/dist package/legado_tauri/dist
          cd package
          zip -r Legado-Linux-with-dist.zip legado_tauri

      - name: Upload Binary With Dist Artifact
        uses: actions/upload-artifact@main
        with:
          name: Legado-Linux-with-dist
          path: package/Legado-Linux-with-dist.zip
          

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@main
        with:
          name: Legado-dist
          path: |
            build/dist/**

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-ubuntu-latest
          path: |
            build/src-tauri/target/release/bundle/appimage/*.AppImage
            build/src-tauri/target/release/bundle/deb/*.deb
            build/src-tauri/target/release/bundle/rpm/*.rpm
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
