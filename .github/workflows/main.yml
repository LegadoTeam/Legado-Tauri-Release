name: Build Legado Tauri (Full Auto)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --frozen-lockfile

     # - name: Type Check Frontend
     #   shell: bash
      #  run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

          pkg-config --modversion glib-2.0
          pkg-config --cflags glib-2.0
          pkg-config --libs glib-2.0

      - name: Build Tauri App
        shell: bash
        env:
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cd build
          pnpm tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-ubuntu-latest
          path: |
            build/src-tauri/target/release/bundle/appimage/*.AppImage
            build/src-tauri/target/release/bundle/deb/*.deb
            build/src-tauri/target/release/bundle/rpm/*.rpm
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --frozen-lockfile

    #  - name: Type Check Frontend
    #    shell: bash
    #    run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Cargo profile
        shell: bash
        run: |
          echo "===== build/src-tauri/Cargo.toml ====="
          cat build/src-tauri/Cargo.toml

      - name: Build Tauri App
        shell: bash
        env:
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
          CARGO_PROFILE_RELEASE_OPT_LEVEL: 0
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
        run: |
          cd build
          pnpm tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-windows-latest
          path: |
            build/src-tauri/target/release/bundle/nsis/*.exe
            build/src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --frozen-lockfile

    #  - name: Type Check Frontend
     #   shell: bash
      #  run: |
       #   cd build
        #  pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cd build
          pnpm tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-macos-latest
          path: |
            build/src-tauri/target/release/bundle/dmg/*.dmg

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@master
        with:
          version: 10.12.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            ndk;27.0.12077973
            cmdline-tools;latest

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v
          java -version
          sdkmanager --list | head -n 40 || true

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --frozen-lockfile

      # - name: Type Check Frontend
      #   shell: bash
      #   run: |
      #     cd build
      #     pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        shell: bash
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Set Android env
        shell: bash
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          NDK_VERSION=$(ls -1 /usr/local/lib/android/sdk/ndk | sort -V | tail -n 1)
          echo "NDK_HOME=/usr/local/lib/android/sdk/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Debug Android env
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "NDK_HOME=$NDK_HOME"
          test -d "$ANDROID_HOME"
          test -d "$NDK_HOME"

      - name: Init Android project
        shell: bash
        run: |
          cd build
          pnpm tauri android init

      - name: Prepare Android signing
        shell: bash
        run: |
          cd build/src-tauri/gen/android
          echo "APK_RELEASE_KEY_ALIAS=${{ secrets.APK_RELEASE_KEY_ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.APK_RELEASE_KEY_PASSWORD }}" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.APK_RELEASE_STORE_PASSWORD }}" >> gradle.properties
          echo "${{ secrets.APK_RELEASE_KEY_STORE }}" | base64 --decode > key.jks

      - name: Patch Android signing config
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("build/src-tauri/gen/android/app/build.gradle.kts")
          text = p.read_text(encoding="utf-8")

          signing_block = '''
              signingConfigs {
                  create("release") {
                      val storeFilePath = rootProject.file("key.jks")
                      if (storeFilePath.exists()) {
                          storeFile = storeFilePath
                          storePassword = project.findProperty("RELEASE_STORE_PASSWORD") as String?
                          keyAlias = project.findProperty("APK_RELEASE_KEY_ALIAS") as String?
                          keyPassword = project.findProperty("RELEASE_KEY_PASSWORD") as String?
                      }
                  }
              }

          '''

          if 'signingConfigs {' not in text:
              text = text.replace('    buildTypes {\n', signing_block + '    buildTypes {\n', 1)

          old = '''        getByName("release") {
                  isMinifyEnabled = true
          '''
          new = '''        getByName("release") {
                  isMinifyEnabled = true
                  signingConfig = signingConfigs.getByName("release")
          '''

          if 'signingConfig = signingConfigs.getByName("release")' not in text:
              text = text.replace(old, new, 1)

          p.write_text(text, encoding="utf-8")
          print("Patched:", p)
          PY

      - name: Build Android APK
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cd build
          pnpm tauri android build --apk --target aarch64

      - name: Upload Android Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-android
          path: |
            build/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  release:
    name: Release
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@main

      - name: Generate release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="Beta-3.26.$(TZ='Asia/Shanghai' date +'%m%d%H%M')"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create Git tag when no tag input
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag_name }}"
          git push origin "${{ steps.meta.outputs.tag_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}

      - name: Create Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          files: |
            **/*.apk
            **/*.AppImage
            **/*.deb
            **/*.rpm
            **/*.dmg
            **/*.exe
            **/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}