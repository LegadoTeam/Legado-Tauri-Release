name: Build Legado Tauri (Full Auto)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Frontend
        shell: bash
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri-Frontend.git frontend

      - name: Clone Backend
        shell: bash
        run: |
          git clone https://github.com/LegadoTeam/Legado-Tauri-Backend.git backend

      - name: Merge Project
        shell: bash
        run: |
          mkdir build
          cp -r frontend/* build/
          cp -r backend/* build/

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.4
          run_install: false

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          pnpm install --frozen-lockfile

      - name: Build Frontend
        shell: bash
        run: |
          cd build
          pnpm build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        shell: bash
        run: |
          cd build
          pnpm tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-${{ matrix.os }}
          path: |
            build/src-tauri/target/release/
            build/src-tauri/target/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ }}